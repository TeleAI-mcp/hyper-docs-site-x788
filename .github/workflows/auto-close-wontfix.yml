name: Auto-close wontfix issues

on:
  issues:
    types:
      - labeled
      - opened
      - edited

jobs:
  auto-close:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues labeled wontfix
        uses: actions/github-script@v7
        with:
          script: |
            if (context.payload.action === 'labeled' || context.payload.action === 'opened' || context.payload.action === 'edited') {
              const issue = context.payload.issue;
              const labels = issue.labels.map(l => l.name);
              if (labels.includes('wontfix')) {
                github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
                console.log(`Closed issue #${issue.number} due to wontfix label`);
              }
            }
